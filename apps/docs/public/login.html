<!doctype html>
<!--
  Login — @vsee/ui prototype
  ──────────────────────────
  VSee Phoenix login refactored to consume @vsee/ui classes directly:
  boxed .input, solid .btn-primary, all tokens from the design system.

  Self-contained: tokens + the subset of styles.css we need are inlined so
  you can open this file directly in a browser with no build step. A brand
  (green/blue/purple) + light/dark toolbar at the top drives the login via
  the same [data-theme]/[data-mode] attributes the real design system uses.
-->
<html lang="en" data-mode="light" data-theme="green">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — @vsee/ui prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       @vsee/ui — Design Tokens (inlined from src/tokens.css)
       ═══════════════════════════════════════════════════════════════════════ */
    :root {
      --vsee-font-sans: "Figtree", system-ui, -apple-system, sans-serif;
      --vsee-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;

      --vsee-brand: #0D875C;
      --vsee-brand-semidark: #096843;
      --vsee-brand-dark: #0A6B49;
      --vsee-brand-darker: #074D35;
      --vsee-brand-light: #E6F5EE;
      --vsee-brand-50: #F0FAF5;

      --vsee-success: #367D17; --vsee-success-light: #F9FEF6;
      --vsee-info: #196CD2; --vsee-info-light: #E0F2FE;
      --vsee-warning: #FFCB5A; --vsee-warning-light: #FEF3C7;
      --vsee-danger: #D31212; --vsee-danger-light: #FEE7E7;
      --vsee-danger-dark: #991B1B;

      --vsee-black: #111827;
      --vsee-grey-900: #4B5563; --vsee-grey-800: #6B7280; --vsee-grey-700: #9CA3AF;
      --vsee-grey-600: #B0B7C3; --vsee-grey-500: #C9CED6; --vsee-grey-400: #E8EAED;
      --vsee-grey-300: #F1F2F4; --vsee-grey-200: #F8F9FA; --vsee-grey-100: #FCFCFD;
      --vsee-white: #FFFFFF;

      --vsee-text-primary: #111827; --vsee-text-secondary: #6B7280;
      --vsee-border: #E5E7EB; --vsee-border-strong: #D1D5DB;

      --vsee-text-overline-size: 12px; --vsee-text-caption-size: 13px; --vsee-text-body-size: 14px;
      --vsee-text-body-lg-size: 16px; --vsee-text-h5-size: 16px; --vsee-text-h4-size: 20px;
      --vsee-text-h3-size: 24px; --vsee-text-h2-size: 36px; --vsee-text-h1-size: 48px;

      --vsee-sp-1: 4px; --vsee-sp-2: 8px; --vsee-sp-3: 12px; --vsee-sp-4: 16px;
      --vsee-sp-5: 20px; --vsee-sp-6: 24px; --vsee-sp-8: 32px; --vsee-sp-10: 40px;
      --vsee-sp-12: 48px;

      --vsee-r-xs: 4px; --vsee-r-sm: 6px; --vsee-r-md: 8px; --vsee-r-lg: 12px;
      --vsee-r-xl: 16px; --vsee-r-2xl: 24px; --vsee-r-full: 9999px;

      --vsee-shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --vsee-shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --vsee-shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --vsee-shadow-focus: 0 0 0 3px rgba(13,135,92,0.15);
      --vsee-hover-overlay: linear-gradient(rgba(0,0,0,0.07), rgba(0,0,0,0.07));

      --vsee-ease: cubic-bezier(0.4, 0, 0.2, 1);
      --vsee-t-fast: 150ms var(--vsee-ease); --vsee-t-base: 200ms var(--vsee-ease);
    }

    [data-theme="blue"] {
      --vsee-brand: #0891B2; --vsee-brand-semidark: #155E75;
      --vsee-brand-dark: #0E7490; --vsee-brand-darker: #164E63;
      --vsee-brand-light: #E0F7FA; --vsee-brand-50: #ECFEFF;
      --vsee-shadow-focus: 0 0 0 3px rgba(8,145,178,0.15);
    }
    [data-theme="purple"] {
      --vsee-brand: #7C3AED; --vsee-brand-semidark: #5E28BF;
      --vsee-brand-dark: #6332C4; --vsee-brand-darker: #47248C;
      --vsee-brand-light: #EDE9FE; --vsee-brand-50: #F5F3FF;
      --vsee-shadow-focus: 0 0 0 3px rgba(124,58,237,0.15);
    }

    [data-mode="dark"] {
      --vsee-brand-light: #0F2D22; --vsee-brand-50: #0A1F18; --vsee-brand-dark: #34D399;
      /* Brightened in dark mode so error text (form errors, input error
         border) passes WCAG AA 4.5:1 against the dark body (~6.5:1). */
      --vsee-danger: #F87171;
      --vsee-danger-light: #2D1212;
      --vsee-black: #F9FAFB;
      --vsee-grey-900: #F3F4F6; --vsee-grey-800: #E5E7EB; --vsee-grey-700: #D1D5DB;
      --vsee-grey-600: #9CA3AF; --vsee-grey-500: #6B7280; --vsee-grey-400: #4B5563;
      --vsee-grey-300: #1F2937; --vsee-grey-200: #111827; --vsee-grey-100: #0F172A;
      --vsee-white: #0B1120;
      --vsee-text-primary: #F9FAFB; --vsee-text-secondary: #9CA3AF;
      --vsee-border: #1F2937; --vsee-border-strong: #374151;
      --vsee-shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.3);
      --vsee-shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4), 0 4px 6px -4px rgb(0 0 0 / 0.3);
      color-scheme: dark;
    }
    [data-mode="dark"][data-theme="blue"]  { --vsee-brand-light: #0C1F2E; --vsee-brand-dark: #67E8F9; }
    [data-mode="dark"][data-theme="purple"]{ --vsee-brand-light: #1A0F2E; --vsee-brand-dark: #C4B5FD; }

    /* ═══════════════════════════════════════════════════════════════════════
       Page chrome — toolbar + centered login stage
       ═══════════════════════════════════════════════════════════════════════ */
    * { box-sizing: border-box; }
    /* Browsers don't inherit font-family on form controls by default — force it
       so every button/input/select picks up Figtree from the body. Without
       this, .btn-link renders in the UA's native button font. */
    button, input, select, textarea { font-family: inherit; font-size: inherit; }
    body {
      margin: 0;
      font-family: var(--vsee-font-sans);
      background: var(--vsee-grey-200);
      color: var(--vsee-text-primary);
      /* Pin the body to the viewport height so the page itself never
         scrolls. The stage gets the remaining space via flex; if the
         card still overflows on very short viewports, the stage
         scrolls internally — not the whole page. */
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--vsee-sp-3) var(--vsee-sp-6);
      background: var(--vsee-white);
      border-bottom: 1px solid var(--vsee-border);
      font-size: var(--vsee-text-caption-size);
    }
    .toolbar strong { font-size: var(--vsee-text-body-lg-size); font-weight: 700; }
    .toolbar .controls { display: flex; align-items: center; gap: var(--vsee-sp-4); }
    .toolbar label { display: flex; align-items: center; gap: var(--vsee-sp-2); color: var(--vsee-text-secondary); }
    .toolbar select, .toolbar button {
      font-family: inherit; font-size: var(--vsee-text-body-size);
      padding: 6px var(--vsee-sp-3);
      background: var(--vsee-white); color: var(--vsee-text-primary);
      border: 1px solid var(--vsee-border-strong); border-radius: var(--vsee-r-sm);
      cursor: pointer;
    }

    .stage {
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      padding: var(--vsee-sp-6);
      overflow: auto;
    }

    /* VSee wordmark stand-in */
    .logo {
      font-family: var(--vsee-font-sans); font-weight: 800; letter-spacing: -1.5px;
      font-size: 36px; line-height: 1;
      color: var(--vsee-brand);
    }
    .logo .dot { color: var(--vsee-brand-light); }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       @vsee/ui component classes (copied verbatim from src/styles.css)
       .field / .form-label / .form-error-text / .input
       .btn / .btn-primary / .btn-ghost / .btn-lg / .btn-block / .btn-link
       ═══════════════════════════════════════════════════════════════════════ */
    .login-card {
      width: 400px; padding: var(--vsee-sp-10);
      background: var(--vsee-white);
      border: 1px solid var(--vsee-border);
      border-radius: var(--vsee-r-xl);
      box-shadow: var(--vsee-shadow-md);
      display: flex; flex-direction: column; align-items: center;
    }
    .login-card .logo { margin-bottom: var(--vsee-sp-8); }

    .field { display: flex; flex-direction: column; position: relative; width: 100%; }
    .form-group { margin-bottom: var(--vsee-sp-5); width: 100%; }
    .form-label { display: block; font-size: var(--vsee-text-caption-size); font-weight: 600; color: var(--vsee-text-primary); margin-bottom: var(--vsee-sp-2); }
    .form-error-text { font-size: var(--vsee-text-overline-size); color: var(--vsee-danger); margin-top: var(--vsee-sp-1); }

    .input {
      width: 100%; height: var(--vsee-sp-10);
      padding: 0 var(--vsee-sp-2) 0 var(--vsee-sp-3);
      font-family: var(--vsee-font-sans); font-size: var(--vsee-text-body-size);
      color: var(--vsee-text-primary); background: var(--vsee-white);
      border: 1px solid var(--vsee-border-strong); border-radius: var(--vsee-r-md);
      transition: all var(--vsee-t-fast); outline: none;
    }
    .input:hover { border-color: var(--vsee-grey-500); }
    .input:focus { border-color: var(--vsee-brand); box-shadow: var(--vsee-shadow-focus); }
    .input::placeholder { color: var(--vsee-text-secondary); }
    .input.error { border-color: var(--vsee-danger); }

    /* Icon-inside-input pattern — same classes as src/styles.css. The
       design system's .input-lg variant has been removed; use default
       .input (40px) everywhere instead. */
    .input-icon-wrap { position: relative; display: flex; align-items: center; width: 100%; }
    .input-with-icon-right { padding-right: 42px !important; }
    .input-icon-btn {
      position: absolute; right: 1px; top: 1px; bottom: 1px;
      width: var(--vsee-sp-10);
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none;
      border-radius: 0 var(--vsee-r-md) var(--vsee-r-md) 0;
      color: var(--vsee-text-secondary); cursor: pointer; outline: none;
      transition: all var(--vsee-t-fast);
    }
    .input-icon-btn:hover { background-image: var(--vsee-hover-overlay); color: var(--vsee-text-primary); }
    /* The eye-toggle has two SVGs; only the one without [hidden] renders.
       Explicit rule because the HTML `hidden` attribute doesn't reliably
       hide SVG children of a flex container in every browser. */
    .input-icon-btn svg[hidden] { display: none; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: var(--vsee-sp-2); font-family: var(--vsee-font-sans); font-weight: 600;
      font-size: var(--vsee-text-body-size); height: 38px;
      padding: var(--vsee-sp-3) var(--vsee-sp-5);
      border-radius: var(--vsee-r-md); border: 1px solid transparent;
      cursor: pointer; transition: all var(--vsee-t-fast);
      white-space: nowrap; outline: none;
    }
    .btn:focus-visible { box-shadow: var(--vsee-shadow-focus); outline: 2px solid var(--vsee-brand); outline-offset: 2px; }
    .btn:disabled { background: var(--vsee-grey-300); color: var(--vsee-text-secondary); border-color: var(--vsee-border-strong); cursor: not-allowed; }
    .btn-primary { background: var(--vsee-brand); color: white; }
    .btn-primary:hover { background-image: var(--vsee-hover-overlay); box-shadow: var(--vsee-shadow-sm); }
    .btn-ghost { background: transparent; color: var(--vsee-text-primary); border: 2px solid var(--vsee-border); }
    .btn-ghost:hover { background-image: var(--vsee-hover-overlay); border-color: var(--vsee-border-strong); }
    .btn-lg { font-size: var(--vsee-text-body-lg-size); height: 40px; padding: var(--vsee-sp-4) var(--vsee-sp-6); }
    .btn-block { display: flex; width: 100%; }
    .btn-link { background: transparent; color: var(--vsee-brand); padding: 0; border: none; font-weight: 600; font-size: var(--vsee-text-caption-size); cursor: pointer; }
    .btn-link:hover { text-decoration: underline; }

    .divider-row {
      display: flex; align-items: center; width: 100%;
      gap: var(--vsee-sp-4); margin: var(--vsee-sp-6) 0;
    }
    .divider-row .rule { flex: 1; height: 1px; background: var(--vsee-border-strong); }
    .divider-row span { font-size: var(--vsee-text-caption-size); color: var(--vsee-text-secondary); }

    .sso-row { display: flex; flex-direction: column; gap: var(--vsee-sp-3); width: 100%; }
    /* Label row: form-label on the left, small "Change email" link on the
       right. Sits above the email input; link only shown once the email
       is locked (signin step 2). */
    .label-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: var(--vsee-sp-2); }
    .label-row .form-label { margin-bottom: 0; }
    .toggle-row { margin-top: var(--vsee-sp-6); font-size: var(--vsee-text-caption-size); color: var(--vsee-text-secondary); text-align: center; }
    .version { margin-top: var(--vsee-sp-8); font-size: var(--vsee-text-overline-size); color: var(--vsee-text-secondary); font-family: var(--vsee-mono); text-align: center; }

    @media (max-width: 480px) {
      .login-card { width: 100%; padding: var(--vsee-sp-6); }
    }
  </style>
</head>

<body>
  <header class="toolbar">
    <strong>Login — @vsee/ui prototype</strong>
    <div class="controls">
      <label>Brand
        <select id="themeSelect">
          <option value="green">Green (default)</option>
          <option value="blue">Blue</option>
          <option value="purple">Purple</option>
        </select>
      </label>
      <label>Mode
        <button id="modeToggle" type="button">Switch to dark</button>
      </label>
    </div>
  </header>

  <main class="stage">
    <form class="login-card" id="login" autocomplete="off" novalidate>
      <div class="logo">vsee<span class="dot">.</span></div>

      <div class="form-group">
        <div class="label-row">
          <label class="form-label" for="email">Email</label>
          <button type="button" class="btn-link" id="changeEmail" hidden>Change email</button>
        </div>
        <input class="input" id="email" type="email"
               placeholder="you@example.com" autocomplete="email" />
        <div class="form-error-text" id="errEmail" hidden></div>
      </div>

      <div class="form-group" id="pwGroup" hidden>
        <label class="form-label" for="pw">Password</label>
        <div class="input-icon-wrap">
          <input class="input input-with-icon-right" id="pw" type="password"
                 placeholder="Enter password" autocomplete="current-password" />
          <button type="button" class="input-icon-btn" id="eye" aria-label="Show password">
            <svg class="eye-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
              <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
              <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 7 11 7a13.16 13.16 0 0 1-1.67 2.68"/>
              <path d="M6.61 6.61A13.526 13.526 0 0 0 1 12s4 7 11 7a9.74 9.74 0 0 0 5.39-1.61"/>
              <line x1="2" y1="2" x2="22" y2="22"/>
            </svg>
          </button>
        </div>
        <div class="form-error-text" id="errPw" hidden></div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block" id="continueBtn">
        Continue
      </button>

      <div class="toggle-row">
        <span id="toggleLabel">Don't have an account? </span>
        <button type="button" class="btn-link" id="toggleAuth">Sign up</button>
      </div>

      <div class="divider-row">
        <div class="rule"></div><span>or</span><div class="rule"></div>
      </div>

      <div class="sso-row">
        <button type="button" class="btn btn-ghost btn-lg btn-block" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <button type="button" class="btn btn-ghost btn-lg btn-block" disabled
                style="background:#000;color:#fff;border-color:#000;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          Continue with Apple
        </button>
      </div>

      <div class="version">v0.8.3 · prototype</div>
    </form>
  </main>

  <script>
    /* Toolbar wiring: brand-theme + light/dark mode */
    const root = document.documentElement;
    document.getElementById('themeSelect').addEventListener('change', (e) => {
      root.setAttribute('data-theme', e.target.value);
    });
    const modeBtn = document.getElementById('modeToggle');
    modeBtn.addEventListener('click', () => {
      const next = root.getAttribute('data-mode') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-mode', next);
      modeBtn.textContent = next === 'dark' ? 'Switch to light' : 'Switch to dark';
    });

    /* Login flow — mirrors va-main's src/components/Login.tsx:
       - sign-in: email step → password step
       - sign-up: email + password together
       - field-scoped error bubbles (email vs password)
       - pw === "fail" simulates an auth failure so the error state is visible
         without wiring a backend */
    const EMAIL_SHAPE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    const emailInput   = document.getElementById('email');
    const pwInput      = document.getElementById('pw');
    const pwGroup      = document.getElementById('pwGroup');
    const continueBtn  = document.getElementById('continueBtn');
    const changeBtn    = document.getElementById('changeEmail');
    const eyeBtn       = document.getElementById('eye');
    const errEmail     = document.getElementById('errEmail');
    const errPw        = document.getElementById('errPw');
    const toggleAuthBtn= document.getElementById('toggleAuth');
    const toggleLabel  = document.getElementById('toggleLabel');

    let step = 'email';   // 'email' | 'password'
    let mode = 'signin';  // 'signin' | 'signup'
    let pwVisible = false;

    function showError(slot, input, msg) {
      slot.textContent = msg; slot.hidden = false;
      if (input) input.classList.add('error');
    }
    function clearError(slot, input) {
      slot.hidden = true; slot.textContent = '';
      if (input) input.classList.remove('error');
    }
    function clearAll() {
      clearError(errEmail, emailInput);
      clearError(errPw, pwInput);
    }

    function advanceToPassword() {
      step = 'password';
      pwGroup.hidden = false;
      emailInput.readOnly = (mode === 'signin');
      // "Change email" link is only meaningful when the email is locked;
      // in signup mode the field stays editable so no link is needed.
      changeBtn.hidden = !emailInput.readOnly;
      pwInput.focus();
    }
    function rewindToEmail() {
      step = 'email';
      pwGroup.hidden = true;
      emailInput.readOnly = false;
      changeBtn.hidden = true;
      pwInput.value = '';
      clearAll();
      emailInput.focus();
    }

    continueBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();

      if (step === 'email' && mode === 'signin') {
        if (!email)                        return showError(errEmail, emailInput, 'Please enter your email.');
        if (!EMAIL_SHAPE.test(email))      return showError(errEmail, emailInput, "That doesn't look like a valid email.");
        clearAll(); advanceToPassword();   return;
      }

      if (mode === 'signup') {
        if (!email)                        return showError(errEmail, emailInput, 'Please enter your email.');
        if (!EMAIL_SHAPE.test(email))      return showError(errEmail, emailInput, "That doesn't look like a valid email.");
      }

      const pw = pwInput.value;
      if (!pw.trim()) return showError(errPw, pwInput, 'Please enter your password.');
      if (pw === 'fail') return showError(errPw, pwInput, 'Sign-in failed. Please check your credentials.');

      continueBtn.disabled = true;
      continueBtn.textContent = 'Connecting...';
      setTimeout(() => {
        continueBtn.disabled = false;
        continueBtn.textContent = mode === 'signup' ? 'Sign up' : 'Continue';
        alert('Would sign in: ' + email);
      }, 800);
    });

    emailInput.addEventListener('input', () => clearError(errEmail, emailInput));
    pwInput.addEventListener('input',    () => clearError(errPw, pwInput));
    emailInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') continueBtn.click(); });
    pwInput.addEventListener('keydown',    (e) => { if (e.key === 'Enter') continueBtn.click(); });

    changeBtn.addEventListener('click', rewindToEmail);

    eyeBtn.addEventListener('click', () => {
      pwVisible = !pwVisible;
      pwInput.type = pwVisible ? 'text' : 'password';
      eyeBtn.setAttribute('aria-label', pwVisible ? 'Hide password' : 'Show password');
      // Swap the eye icon — toggleAttribute is more reliable than the
      // `.hidden` property setter on SVGElement across browsers.
      eyeBtn.querySelector('.eye-show').toggleAttribute('hidden', pwVisible);
      eyeBtn.querySelector('.eye-hide').toggleAttribute('hidden', !pwVisible);
    });

    toggleAuthBtn.addEventListener('click', () => {
      mode = mode === 'signin' ? 'signup' : 'signin';
      if (mode === 'signup') {
        toggleLabel.textContent = 'Already have an account? ';
        toggleAuthBtn.textContent = 'Sign in';
        continueBtn.textContent = 'Sign up';
        advanceToPassword();
        emailInput.readOnly = false;
      } else {
        toggleLabel.textContent = "Don't have an account? ";
        toggleAuthBtn.textContent = 'Sign up';
        continueBtn.textContent = 'Continue';
        rewindToEmail();
      }
    });
  </script>
</body>
</html>
