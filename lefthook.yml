# Pre-commit gates for vp-design-system.
# Install once: `npx lefthook install`.
# The `gitleaks` binary is optional — if missing, the security job
# prints a warning and passes. Never hard-blocks.

pre-commit:
  parallel: true
  jobs:
    - name: security
      # Short-circuit one-liner — some shells (Windows Git Bash via
      # lefthook) fail to parse the multi-line if/then/fi form.
      run: |
        command -v gitleaks >/dev/null 2>&1 && gitleaks git --staged || echo "⚠ gitleaks not installed — skipping security scan (install with: brew install gitleaks)"
    - name: lint
      glob: "apps/docs/**/*.{ts,tsx,js,jsx,css}"
      run: |
        cd apps/docs
        npm run lint
