# Pre-commit gates for vp-design-system.
# Install once: `npx lefthook install`.
# The `gitleaks` binary is optional — if missing, the security job
# prints a warning and passes. Never hard-blocks.

pre-commit:
  parallel: true
  jobs:
    - name: security
      # On Windows, lefthook invokes `run:` directly without a shell, so
      # inline `if`/pipes/quotes don't work. Routing through `bash <script>`
      # gives the conditional a real shell on every platform.
      run: bash scripts/pre-commit-gitleaks.sh
    - name: lint
      glob: "apps/docs/**/*.{ts,tsx,js,jsx,css}"
      run: |
        cd apps/docs
        npm run lint
